<!DOCTYPE html>
<html lang="zh-hant-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    .box {
      width: 30px;
      height: 30px;
      margin-bottom: 10px;
      background-color: #1878e6;
      color: #fff;
      font-family: sans-serif;
      font-size: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .box2 {
      background-color: #eda90b;
    }

    .box3 {
      background-color: #29d306;
    }
  </style>
  <title>timeline 01</title>
</head>

<body>
  <div class="box box1">1</div>
  <div class="box box2">2</div>
  <div class="box box3">3</div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/GSDevTools.min.js"></script>
  <script>
    const box1 = document.querySelector(".box1");
    const position = window.innerWidth - box1.getBoundingClientRect().width - 16;
    console.log(position);

    const tl = gsap.timeline();
    tl.to(".box1", {
      x: position,
      duration: 1
    }, 0);
    tl.to(".box2", {
      x: position,
      duration: 2
    }, 3);
    tl.to(".box3", {
      x: position,
      duration: 1
    }, 6);

  </script>
</body>

</html>
