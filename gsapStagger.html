<!DOCTYPE html>
<html lang="zh-hant-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    .container {
      display: flex;
      gap: 10px;
      margin-bottom: 60px;

      .box {
        width: 50px;
        height: 50px;
        background-color: #036af0;
        color: #fff;
        font-family: sans-serif;
        font-size: 24px;
        display: flex;
        justify-content: center;
        align-items: center;
        /* added */
        transform: translateY(30px);
        opacity: 0;
      }
    }
  </style>
  <title>gsap stagger</title>
</head>

<body>
  <div class="container container1">
    <div class="box">A</div>
    <div class="box">B</div>
    <div class="box">C</div>
    <div class="box">D</div>
    <div class="box">E</div>
  </div>
  <div class="container container2">
    <div class="box">A</div>
    <div class="box">B</div>
    <div class="box">C</div>
    <div class="box">D</div>
    <div class="box">E</div>
  </div>
  <div class="container container3">
    <div class="box">A</div>
    <div class="box">B</div>
    <div class="box">C</div>
    <div class="box">D</div>
    <div class="box">E</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/gsap.min.js"></script>
  <script>
    requestIdleCallback(function () {
      gsap.to(
        ".container1 .box",
        {
          y: 0,
          opacity: 1,
          duration: 0.5,
          stagger: 0.2
        }
      );
    });
  </script>
</body>

</html>
